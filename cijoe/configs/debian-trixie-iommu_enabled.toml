# uPCIe cijoe configuration: IOMMU enabled (vfio-pci and iommufd target)
#
# Drives the QEMU guest with an enforcing intel-iommu so devices can be used
# through vfio-pci and mapped via the iommufd /dev/iommu API. Pair with
# system_imaging.toml, e.g.:
#
#   cijoe tasks/provision.yaml \
#     --config configs/debian-trixie-iommu_enabled.toml \
#     --config configs/system_imaging.toml
#
# The guest kernel must boot with 'intel_iommu=on iommu=pt' for vfio-pci to
# attach. For the IOMMU-disabled (uio_pci_generic) counterpart see
# debian-trixie-iommu_disabled.toml.

# The SSH options are passed verbatim to paramiko; see https://www.paramiko.org/
[cijoe.transport.root]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

# Operator account on nosi images; used by root_unlock. Inert when root SSH
# already works (fork-based guest, or pre-unlocked images).
[cijoe.transport.odus]
username = "odus"
password = "odus.321"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[os]
name = "debian"
version = "trixie"

[build.compiler]
bin = "gcc"

[upcie.repository]
remote = "https://github.com/safl/upcie.git"
path = "{{ local.env.HOME }}/git/upcie"

[devices.pcie.'0000:01:00.0']

# Used by: the qemu.*.py scripts
[qemu]
img_bin = "qemu-img"
default_guest = "trixie_amd64"
default_systemimage = "debian-13-x86_64"

[qemu.systems.x86_64]
bin = "qemu-system-x86_64"

# Used by: qemu.guest_start.py and qemu.guest_kill.py
[qemu.guests.trixie_amd64]
path = "{{ local.env.HOME }}/guests/debian-trixie-amd64"
system_label = "x86_64"

# Keyword arguments: joined onto the form: "-cpu host -smp 4 -m 4" etc.
system_args.kwa = {cpu = "host", smp = 4, m = "6G", accel = "kvm"}

# Raw arguments: passed without modification to qemu-system-{arch}
system_args.raw = """\
-M "type=q35,kernel_irqchip=split" \
-device "intel-iommu,pt=on,intremap=on,caching-mode=on" \
"""

# TCP_FORWARD: Setup ssh forward from host to guest
system_args.tcp_forward = {host = 4200, guest = 22}

# nosi guest image pulled by stage_nosi_guest into the system-imaging disk.path
[guest_image]
url = "https://ghcr.io/v2/safl/nosi/debian-13-headless/blobs/sha256:1cdbf24c081516500735ce7f3f96e3212a472fb0528276e23c939035791900dc"
