# uPCIe cijoe configuration: IOMMU disabled (uio_pci_generic target)
#
# Drives the QEMU guest without an enforcing IOMMU. Devices are reachable with
# raw physical addresses, which is what uio_pci_generic and the hugepage-backed
# DMA path rely on. Pair with system_imaging.toml, e.g.:
#
#   cijoe tasks/provision.yaml \
#     --config configs/ubuntu-2604-iommu_disabled.toml \
#     --config configs/system_imaging.toml
#
# For the IOMMU-enabled (vfio-pci and iommufd) counterpart see
# ubuntu-2604-iommu_enabled.toml.

# The SSH options are passed verbatim to paramiko; see https://www.paramiko.org/
[cijoe.transport.root]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

# Operator account on nosi images; used by root_unlock. Inert when root SSH
# already works (fork-based guest, or pre-unlocked images).
[cijoe.transport.odus]
username = "odus"
password = "odus.321"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[os]
name = "ubuntu"
version = "26.04"

[build.compiler]
bin = "gcc"

[upcie.repository]
remote = "https://github.com/safl/upcie.git"
path = "{{ local.env.HOME }}/git/upcie"

[devices.pcie.'0000:01:00.0']

# Used by: the qemu.*.py scripts
[qemu]
img_bin = "qemu-img"
default_guest = "ubuntu_2604_amd64"
default_systemimage = "ubuntu-2604-x86_64"

[qemu.systems.x86_64]
bin = "qemu-system-x86_64"

# Used by: qemu.guest_start.py and qemu.guest_kill.py
[qemu.guests.ubuntu_2604_amd64]
path = "{{ local.env.HOME }}/guests/ubuntu-2604-amd64"
system_label = "x86_64"

# Keyword arguments: joined onto the form: "-cpu host -smp 4 -m 4" etc.
system_args.kwa = {cpu = "host", smp = 4, m = "6G", accel = "kvm"}

# Raw arguments: passed without modification to qemu-system-{arch}
# No IOMMU device: uPCIe accesses PCIe BARs and DMAs with raw physical addresses
system_args.raw = """\
-M "type=q35" \
"""

# TCP_FORWARD: Setup ssh forward from host to guest
system_args.tcp_forward = {host = 4200, guest = 22}

# nosi guest image pulled by stage_nosi_guest into the system-imaging disk.path
[guest_image]
url = "oras://ghcr.io/safl/nosi/ubuntu-2604-headless@sha256:ba8a8e478a067fa3f566dcb05559d83abf3c823b10d93c0b27fb896192d03628"
