# Shared system-imaging image definitions; pass alongside a guest config:
#
#   --config configs/<guest>.toml --config configs/system_imaging.toml
#
# The debian-13 disk image is staged by stage_nosi_guest from the guest config's
# [guest_image].url into disk.path, where qemu.guest_initialize picks it up.
[system-imaging.images.debian-13-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloudinit/debian-13-generic-amd64-daily.qcow2"
cloud.metadata_path = "{{ resources.auxiliary['system_imaging.cloudinit-linux-common-metadata'] }}"
cloud.userdata_path = "{{ resources.auxiliary['system_imaging.cloudinit-linux-common-userdata'] }}"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/debian-trixie-amd64.qcow2"
