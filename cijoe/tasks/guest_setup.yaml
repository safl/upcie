---
doc: |
  Bring up the QEMU guest from the nosi image

  The QEMU-specific phase, kept apart from deployment because it depends on the
  qemu.* and system-imaging config that does not apply to a real machine. It
  kills any running guest, stages the nosi disk-image into the system-imaging
  disk.path, initializes and starts the guest, and leaves it running with root
  still locked. Select the IOMMU mode by which guest config is passed, e.g.:

    cijoe tasks/guest_setup.yaml \
      --config configs/ubuntu-2604-iommu_disabled.toml \
      --config configs/system_imaging.toml

  Follow with tasks/deploy.yaml (which opens root on the nosi operator and is
  retargetable: it runs the same against a guest or a real machine) and
  tasks/test.yaml.

steps:
- name: guest_kill
  uses: qemu.guest_kill
  with:
    guest_name: "{{ config.qemu.default_guest }}"

- name: stage_nosi_guest
  uses: stage_nosi_guest

- name: guest_initialize
  uses: qemu.guest_initialize
  with:
    guest_name: "{{ config.qemu.default_guest }}"
    system_image_name: "{{ config.qemu.default_systemimage }}"

- name: guest_start
  uses: qemu_guest_start_nvme
  with:
    guest_name: "{{ config.qemu.default_guest }}"
