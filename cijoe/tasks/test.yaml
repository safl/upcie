---
doc: |
  Run the uPCIe test-suite against a provisioned guest

  Expects a guest already brought up by 'provision.yaml' (built, installed, with
  drivers loaded and hugepages allocated). Pass the same guest config, e.g.:

    cijoe tasks/test.yaml \
      --config configs/debian-trixie-iommu_disabled.toml \
      --config configs/system_imaging.toml

steps:
- name: test
  uses: core.testrunner
  with:
    args: '{{ config.upcie.repository.path }}/tests'
    random_order: false
