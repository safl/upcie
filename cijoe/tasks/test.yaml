---
doc: |
  Run the uPCIe test-suite against the transport target

  Expects uPCIe already deployed by 'deploy.yaml' (built, installed, drivers
  loaded, hugepages allocated) on the target, which may be a QEMU guest brought
  up by 'guest_setup.yaml' or a real machine reached over SSH. Pass the same
  config, e.g.:

    cijoe tasks/test.yaml --config configs/ubuntu-2604-iommu_disabled.toml

steps:
- name: test
  uses: core.testrunner
  with:
    args: '{{ config.upcie.repository.path }}/tests'
    random_order: false
