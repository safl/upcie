# Doxygen configuration for the uPCIe documentation.
#
# Run from the docs/ directory; the Sphinx build (via Breathe) consumes the
# XML emitted under _build/doxy/xml. See docs/src/conf.py for the Breathe wiring.

PROJECT_NAME           = "uPCIe"
OUTPUT_DIRECTORY       = _build/doxy
INPUT                  = ../include/upcie
STRIP_FROM_PATH        = ../include
RECURSIVE              = YES
FILE_PATTERNS          = *.h

OPTIMIZE_OUTPUT_FOR_C  = YES
EXTRACT_ALL            = YES
EXTRACT_STATIC         = YES
JAVADOC_AUTOBRIEF      = YES

# Evaluate the feature-guard ifdefs so only the real implementation is
# documented, not the -ENOSYS stubs in the #else branch. Without this the
# guarded helpers are indexed twice and Breathe emits duplicate declarations.
ENABLE_PREPROCESSING   = YES
MACRO_EXPANSION        = YES
EXPAND_ONLY_PREDEF     = YES
PREDEFINED             = UDMABUF_ATTACH UDMABUF_DETACH

GENERATE_HTML          = NO
GENERATE_LATEX         = NO
GENERATE_XML           = YES
XML_OUTPUT             = xml

QUIET                  = YES
WARN_IF_UNDOCUMENTED   = NO
